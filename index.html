<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>purr-fect valentine · moving no button (mobile+)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* remove grey tap on mobile */
            cursor: default;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe4ec 0%, #ffd9e8 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 12px;
            touch-action: pan-y pinch-zoom; /* allow gentle page scroll if needed, but buttons will manage */
        }

        /* doodle background – floating cats, lilies, balloons */
        .doodle-world {
            position: fixed;
            inset: 0;
            pointer-events: none;  /* so buttons are still clickable through doodles */
            z-index: 1;
        }

        .doodle {
            position: absolute;
            font-size: clamp(2rem, 10vw, 4.5rem);
            filter: drop-shadow(2px 4px 6px rgba(245, 155, 185, 0.3));
            animation: floatSoft 8s infinite ease-in-out;
            opacity: 0.7;
            user-select: none;
            pointer-events: none;
        }

        /* random positions & delays – more doodles for rich background */
        .doodle:nth-child(1) { top: 5%; left: 2%; animation-delay: 0s; }
        .doodle:nth-child(2) { bottom: 10%; right: 1%; animation-delay: 1.2s; font-size: 5rem; }
        .doodle:nth-child(3) { top: 18%; right: 8%; animation-delay: 2.4s; }
        .doodle:nth-child(4) { bottom: 22%; left: 7%; animation-delay: 0.9s; font-size: 5rem; }
        .doodle:nth-child(5) { top: 70%; left: 15%; animation-delay: 1.8s; }
        .doodle:nth-child(6) { top: 12%; right: 20%; animation-delay: 0.3s; }
        .doodle:nth-child(7) { bottom: 35%; right: 15%; animation-delay: 2.1s; }
        .doodle:nth-child(8) { top: 50%; left: 3%; animation-delay: 1.5s; }
        .doodle:nth-child(9) { bottom: 5%; left: 30%; animation-delay: 0.6s; }
        .doodle:nth-child(10) { top: 80%; right: 5%; animation-delay: 2.7s; }
        .doodle:nth-child(11) { top: 30%; left: 35%; animation-delay: 1.1s; }
        .doodle:nth-child(12) { bottom: 15%; left: 50%; animation-delay: 0.4s; }
        .doodle:nth-child(13) { top: 10%; left: 65%; animation-delay: 1.9s; }
        .doodle:nth-child(14) { top: 40%; right: 30%; animation-delay: 2.2s; }
        .doodle:nth-child(15) { bottom: 30%; left: 75%; animation-delay: 0.7s; }

        @keyframes floatSoft {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-16px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* main valentine card – fully responsive */
        .valentine-card {
            background: rgba(255, 245, 250, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 60px 60px;
            border: 3px solid rgba(255, 200, 220, 0.9);
            box-shadow: 0 25px 40px -12px #fbaacb, 0 8px 18px -5px #fbb0cb;
            padding: 2rem 1.5rem 2.2rem;
            text-align: center;
            max-width: 560px;
            width: 100%;
            position: relative;
            z-index: 20;
            transition: box-shadow 0.2s;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 700;
            color: #bd2b5b;
            text-shadow: 3px 3px 0 #ffcddc;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: 'Trebuchet MS', 'Quicksand', cursive;
            word-break: break-word;
            line-height: 1.2;
        }

        .sub {
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            color: #d45c7a;
            background: #fff0f5cc;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            backdrop-filter: blur(2px);
            border: 2px dashed #ffb3c6;
            font-weight: 500;
        }

        /* button container with relative positioning for moving button */
        .button-area {
            position: relative;
            min-height: 200px;        /* gives room for movement on all screens */
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 15px 0 10px;
            touch-action: pan-y;       /* allow slight scroll if finger moves outside */
        }

        /* base button style – fat and friendly */
        .valentine-btn {
            font-size: clamp(1.8rem, 7vw, 2.5rem);
            font-weight: 700;
            padding: 14px 28px;
            border: none;
            border-radius: 60px;
            box-shadow: 0 7px 0 #b34e71, 0 14px 22px -8px #e47b9f;
            transition: all 0.1s ease;
            letter-spacing: 1px;
            background: #ffb3cf;
            color: #641e3a;
            border: 3px solid #ffe2ed;
            cursor: pointer;
            display: inline-block;
            min-width: 150px;
            transform: translateY(0);
            z-index: 30;
            -webkit-touch-callout: none;
            -webkit-appearance: none;
        }

        .valentine-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b34e71, 0 8px 12px -4px #e07b9f;
        }

        /* yes button – stays in flow, but we'll use it as anchor */
        #yesBtn {
            background: #ff98bb;
            box-shadow: 0 7px 0 #aa3f63, 0 14px 22px -8px #cf6085;
            flex-shrink: 0;
        }

        /* no button – absolute so it can move */
        .moving-btn {
            position: absolute;
            /* initial will be set via JS */
            transition: left 0.15s ease-out, top 0.15s ease-out;
            will-change: left, top;
            margin: 0;
            z-index: 45;
            touch-action: none;        /* prevent browser from panning when touching button */
        }

        /* extra doodle inside card */
        .inline-doodle {
            font-size: 2.2rem;
            margin: 0 6px;
            filter: drop-shadow(0 4px 4px #fcaac0);
            display: inline-block;
        }

        .heart-sticker {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 6px;
        }

        footer {
            margin-top: 25px;
            color: #c96283;
            font-size: clamp(1rem, 4vw, 1.3rem);
            background: #ffeef4d0;
            border-radius: 40px;
            padding: 10px 18px;
            border: 2px dotted #ffa5c0;
            backdrop-filter: blur(2px);
        }

        /* small screen fine-tuning */
        @media (max-width: 450px) {
            .valentine-card {
                padding: 1.5rem 1rem 1.8rem;
                border-radius: 40px;
            }
            .button-area {
                min-height: 230px;    /* more room because buttons are larger relative */
            }
            .valentine-btn {
                min-width: 130px;
                padding: 12px 16px;
            }
        }

        /* for very short screens (landscape) */
        @media (max-height: 600px) {
            .valentine-card {
                padding: 1rem 1rem 1.3rem;
            }
            .button-area {
                min-height: 160px;
            }
            h1 { margin-bottom: 0px; }
        }
    </style>
</head>
<body>

    <!-- background doodle layer (more cats, lilies, balloons) -->
    <div class="doodle-world">
        <!-- cats -->
        <div class="doodle">🐱</div>
        <div class="doodle">😺</div>
        <div class="doodle">🐈⬛</div>
        <div class="doodle">😸</div>
        <div class="doodle">🐈</div>
        <div class="doodle">😻</div>
        <!-- lily flowers (variety) -->
        <div class="doodle">⚜️</div>
        <div class="doodle">🌸</div>
        <div class="doodle">🏵️</div>
        <div class="doodle">🌷</div>
        <div class="doodle">🌺</div>
        <!-- balloons -->
        <div class="doodle">🎈</div>
        <div class="doodle">🎈</div>
        <div class="doodle">🎈</div>
        <div class="doodle">🎈</div>
        <!-- extra cat print -->
        <div class="doodle">🐾</div>
    </div>

    <!-- main valentine card -->
    <div class="valentine-card">
        <div class="heart-sticker">
            <span class="inline-doodle">🐱</span> 💗 <span class="inline-doodle">⚜️</span> 💗 <span class="inline-doodle">🎈</span>
        </div>
        <h1>will you be<br>my valentine?</h1>
        <div class="sub">
            <span>😻</span> meow! <span>🌷</span>
        </div>

        <!-- button area with moving no button (optimized for touch) -->
        <div class="button-area" id="buttonArea">
            <!-- YES button (normal flow) -->
            <button class="valentine-btn" id="yesBtn" onclick="showValentineYes()">💖 yes!</button>

            <!-- NO button (absolute positioned, moves on touch/hover) -->
            <button class="valentine-btn moving-btn" id="noBtn" ontouchstart="moveNoButton(); event.preventDefault();" onclick="preventClick(event)">💔 no</button>
        </div>

        <footer>
            <span>💕</span>  the "no" button runs away  <span>💕</span>
            <div style="font-size: 0.95rem; margin-top: 5px;">(tap yes for a sweet surprise ✨)</div>
        </footer>
    </div>

    <script>
        (function() {
            // ---- moving "no" button logic (mobile + desktop) ----
            const noButton = document.getElementById('noBtn');
            const buttonArea = document.getElementById('buttonArea');
            const yesBtn = document.getElementById('yesBtn');

            // ensure no button starts at a safe position (right side, not overlapping yes)
            function setSmartInitialPosition() {
                // wait for layout
                setTimeout(() => {
                    const areaRect = buttonArea.getBoundingClientRect();
                    const btnRect = noButton.getBoundingClientRect();
                    const yesRect = yesBtn.getBoundingClientRect();

                    const btnWidth = btnRect.width;
                    const btnHeight = btnRect.height;

                    // calculate ideal right side placement, avoid covering yesBtn
                    // we want it to be to the right of yesBtn, if space, else below/above.
                    const yesRight = yesRect.right - areaRect.left;
                    const availableWidth = areaRect.width;

                    let leftPos, topPos;

                    if (yesRight + btnWidth + 20 < availableWidth) {
                        // place to the right of yes button
                        leftPos = yesRight + 20;
                    } else {
                        // place on the far right but with margin
                        leftPos = Math.min(availableWidth - btnWidth - 12, availableWidth * 0.65);
                    }

                    // vertical: roughly centered, but not overlapping yes
                    const yesTopRelative = yesRect.top - areaRect.top;
                    const yesBottomRelative = yesRect.bottom - areaRect.top;

                    // try to put no at vertical center if possible, else above or below
                    const areaCenter = areaRect.height / 2;
                    topPos = areaCenter - btnHeight / 2;

                    // but ensure it doesn't overlap yes button too much (vertical)
                    const noMiddle = topPos + btnHeight/2;
                    const yesMiddle = yesTopRelative + (yesRect.height)/2;

                    if (Math.abs(noMiddle - yesMiddle) < 50 && Math.abs(leftPos - (yesRect.left - areaRect.left)) < 150) {
                        // too close, shift down or up
                        topPos = yesBottomRelative + 15;
                        if (topPos + btnHeight > areaRect.height - 10) {
                            topPos = yesTopRelative - btnHeight - 15;
                        }
                    }

                    // clamp to boundaries
                    leftPos = Math.max(8, Math.min(leftPos, areaRect.width - btnWidth - 8));
                    topPos = Math.max(8, Math.min(topPos, areaRect.height - btnHeight - 8));

                    noButton.style.left = leftPos + 'px';
                    noButton.style.top = topPos + 'px';
                }, 30);
            }

            // get random safe position (within button area)
            function getRandomPosition() {
                const areaRect = buttonArea.getBoundingClientRect();
                const btnRect = noButton.getBoundingClientRect();

                const btnWidth = btnRect.width;
                const btnHeight = btnRect.height;
                const padding = 12;

                let maxLeft = areaRect.width - btnWidth - padding;
                let maxTop = areaRect.height - btnHeight - padding;

                // ensure positive
                maxLeft = Math.max(padding, maxLeft);
                maxTop = Math.max(padding, maxTop);

                const left = padding + Math.random() * (maxLeft - padding);
                const top = padding + Math.random() * (maxTop - padding);

                return { left, top };
            }

            // move button (called on hover / touch)
            function moveNoButton() {
                // prevent default during touch
                if (event && event.cancelable) event.preventDefault();

                const areaRect = buttonArea.getBoundingClientRect();
                const btnRect = noButton.getBoundingClientRect();

                // current relative position
                const currentLeft = btnRect.left - areaRect.left;
                const currentTop = btnRect.top - areaRect.top;

                let newLeft, newTop;
                let attempts = 0;
                const maxAttempts = 20;

                // try to find a position not too close to current (makes it feel like it's running)
                do {
                    const pos = getRandomPosition();
                    newLeft = pos.left;
                    newTop = pos.top;
                    attempts++;
                    if (attempts > maxAttempts) break;
                } while (Math.hypot(newLeft - currentLeft, newTop - currentTop) < 60 && attempts < 15);

                // apply new position
                noButton.style.left = newLeft + 'px';
                noButton.style.top = newTop + 'px';

                // small haptic feedback (optional, just for modern mobile)
                if (navigator.vibrate) navigator.vibrate(10);
            }

            // prevent clicking no button and move aggressively
            function preventClick(event) {
                event.preventDefault();
                event.stopPropagation();

                // move button even more (twice for drama)
                moveNoButton();
                setTimeout(() => moveNoButton(), 20);

                // show playful alert (mobile friendly)
                alert("💘 uh-uh! the 'no' button is shy… it ran away! 💘");
                return false;
            }

            // yes button click – sweet message
            function showValentineYes() {
                alert("💗 yay!!! meow means yes! happy valentine's day! 💗 🐱 ⚜️ 🎈");
                // optional little visual change
                document.querySelector('h1').innerHTML = '💞 yay! 💞';
                document.querySelector('.sub').innerHTML = '🐱💗⚜️ i knew it! 💗🎈🐱';
            }

            // attach event listeners (mobile + desktop)
            noButton.addEventListener('touchstart', function(e) {
                e.preventDefault();      // prevent scrolling
                moveNoButton();
            }, { passive: false });

            noButton.addEventListener('mouseenter', moveNoButton);
            noButton.addEventListener('click', preventClick);

            // also move on touchmove (to catch finger sliding onto button)
            noButton.addEventListener('touchmove', function(e) {
                e.preventDefault();
                moveNoButton();
            }, { passive: false });

            // reposition on resize and orientation change
            window.addEventListener('resize', function() {
                // keep no button inside visible area
                const areaRect = buttonArea.getBoundingClientRect();
                const btnRect = noButton.getBoundingClientRect();

                let left = parseFloat(noButton.style.left) || 0;
                let top = parseFloat(noButton.style.top) || 0;

                const maxLeft = areaRect.width - btnRect.width - 12;
                const maxTop = areaRect.height - btnRect.height - 12;

                left = Math.max(12, Math.min(left, maxLeft));
                top = Math.max(12, Math.min(top, maxTop));

                noButton.style.left = left + 'px';
                noButton.style.top = top + 'px';
            });

            // initialize after everything loaded
            window.addEventListener('load', function() {
                setSmartInitialPosition();
            });

            // also set initial after short delay (for slower devices)
            setTimeout(setSmartInitialPosition, 100);

            // extra: force reposition if user tries to tap on button area background (no effect)
            // but we are fine

            // expose functions globally for onclick attributes
            window.showValentineYes = showValentineYes;
            window.preventClick = preventClick;
            window.moveNoButton = moveNoButton;   // used in ontouchstart inline
        })();
    </script>

    <!-- add second inline handler for safety (already attached via listeners) -->
</body>
</html>
